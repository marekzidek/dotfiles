# smart pane switching with awareness of vim splits
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|lf|ranger' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|lf|ranger' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|lf|ranger' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|lf|ranger' && tmux send-keys C-h) || tmux select-pane -L"

# Letting everyone know huch much colors I have :D
set -g default-terminal "xterm-256color"

# This is toggle for synchronizing (writing to all panes)
# bind -n C-s setw synchronize-panes


#bind -n C-q run-shell -b  "tmux list-windows -F \'##I:##W\' | fzf-tmux -p | cut -d: -f 1 | xargs tmux select-window -t"


# Below is the last one that worked
#bind -n C-q run-shell -b "tmux list-windows -F \'##{window_activity}:##{window_id}:##W\' | sort -r | cut -d: -f 2,3 | fzf-tmux -p | sed 's/.$//' | cut -d: -f 1 | xargs tmux select-window -t"

# Below is the updated one by claude that should actually not show the current window in the list .... we'll see
bind -n C-q run-shell -b "tmux list-windows -F '##{window_active}:##{window_activity}:##{window_id}:##W' | grep -v '^1:' | sort -t: -k2 -r | cut -d: -f 3,4 | fzf-tmux -p | cut -d: -f 1 | xargs tmux select-window -t"


#bind -n C-q run-shell -b  "tmux list-windows | fzf-tmux -p | cut -d: -f 1 | xargs tmux select-window -t"

# A new keybiding for last window, because I always forget the default one
bind -n C-\\ last-window


# Start window numbering at 1
set -g base-index 1
# Renumber windows when some are closed
set-option -g renumber-windows on

# Open new window at first position
bind-key c new-window -t 1 -a -c "~" \; swap-window -t 1 \; select-window -t 1
setw -g aggressive-resize on




# Resizing panes with
bind -n M-down resize-pane -D 1
bind -n M-up resize-pane -U 1
bind -n M-right resize-pane -R 1
bind -n M-left resize-pane -L 1

# This should be faster scrolling
set -g mouse on

set -g status-position top
set-option -g status-keys vi
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi WheelUpPane send-keys -X halfpage-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X halfpage-down

# Have vimlike split commands
# New window with default path set to last path
bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Better keybindings for copying
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -Tcopy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe "~/dotfiles/utils/copy"
setw -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane

# Set default shell
if-shell "test -f /usr/local/bin/zsh" "set-option -g default-shell /usr/local/bin/zsh"
if-shell "test -f /bin/zsh" "set-option -g default-shell /bin/zsh"


# pane movement
 bind j run-shell -b "~/.tmux/scripts/focus-pair.sh"
 bind J run-shell -b "~/.tmux/scripts/focus-pair-revert.sh"

#bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
#bind-key t command-prompt -p "send pane to:"  "join-pane -t '%%'"

# Browser-like tabbing - Added as send hex in iterm2: determine hexes by `xxd -psd`
set-option -gw xterm-keys on
#bind-key -n C-Tab next-window
#bind-key -n C-S-tab run "tmux previous-window"

bind m previous-window

# Better scroll depth
set -g history-limit 99999


# Add tmuxline
if-shell "test -f ~/dotfiles/.tmuxline" "source ~/dotfiles/.tmuxline"

# Make the prefix more usable
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Customization of splitting borders
#set -g pane-border-style fg=default
#set -g pane-active-border-style fg=default
#set -g pane-active-border-style bg=default

set-option -sg escape-time 10

# Have vimlike split commands
#bind v split-window -h
#bind s split-window -v
unbind '"'
unbind %



# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# List of plugins
#set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'


# Do a prefix + crtr-r to restore the last session manually if this automatic thing fails
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
